<!DOCTYPE html>
<html>
<head><title>Visual Logo Audit</title></head>
<body style="background: #ccc; padding: 20px; font-family: sans-serif;">
  <h1>Logo Directory Audit</h1>
  <div style="display: flex; gap: 20px; flex-wrap: wrap;">
    <div style="background: white; padding: 10px; border: 1px solid #999;">
      <h3>logo.png</h3>
      <img src="/logo.png" style="height: 100px; border: 1px solid red;">
    </div>
    <div style="background: white; padding: 10px; border: 1px solid #999;">
      <h3>logo camelia.png</h3>
      <img src="/logo%20camelia.png" style="height: 100px; border: 1px solid red;">
    </div>
    <div style="background: white; padding: 10px; border: 1px solid #999;">
      <h3>logo-branca.png</h3>
      <img src="/logo-branca.png" style="height: 100px; border: 1px solid red; background: #333;">
    </div>
    <div style="background: white; padding: 10px; border: 1px solid #999;">
      <h3>favicon.png</h3>
      <img src="/favicon.png" style="height: 100px; border: 1px solid red;">
    </div>
  </div>
</body>
</html>
